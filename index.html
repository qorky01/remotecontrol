<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>아이폰11 리프트 조종기</title>
    <style>
        /* 아이폰 11 전체 화면 설정 */
        :root {
            --bg-yellow: #f4c242;
            --border-yellow: #d4a328;
            --btn-black: #222;
            --btn-red: #8b0000;
            --btn-green: #2d5a27;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #121212; /* 폰 배경 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Arial Black', sans-serif;
        }

        /* 리모컨 몸체: 아이폰 11 비율에 맞춤 */
        .remote-body {
            width: 340px;
            height: 760px; /* 아이폰 11 세로 길이에 최적화 */
            background: linear-gradient(145deg, #fdd835, #f4c242);
            border-radius: 45px;
            border: 5px solid var(--border-yellow);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 15px rgba(255,255,255,0.5);
            box-sizing: border-box;
        }

        /* 위험 표시 줄무늬 (상단) */
        .hazard-stripe {
            width: 100%;
            height: 40px;
            background: repeating-linear-gradient(
                45deg,
                #111,
                #111 20px,
                #fdd835 20px,
                #fdd835 40px
            );
            margin-top: 60px;
            border-top: 2px solid #333;
            border-bottom: 2px solid #333;
        }

        /* 네 귀퉁이 나사 */
        .screw {
            width: 18px;
            height: 18px;
            background: radial-gradient(circle at 30% 30%, #bbb, #555);
            border-radius: 50%;
            position: absolute;
            box-shadow: 2px 2px 4px rgba(0,0,0,0.4);
        }
        .s-tl { top: 20px; left: 25px; }
        .s-tr { top: 20px; right: 25px; }
        .s-bl { bottom: 20px; left: 25px; }
        .s-br { bottom: 20px; right: 25px; }

        /* 버튼 컨테이너 (세로 배치) */
        .button-stack {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly; /* 버튼 간격을 균등하게 */
            align-items: center;
            width: 100%;
            padding: 20px 0 40px 0;
        }

        /* 버튼 그룹 (버튼 + 글자) */
        .btn-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        /* 이미지와 똑같은 입체적 버튼 스타일 */
        .btn-outer {
            width: 110px;
            height: 110px;
            background: #111;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 0 #000;
        }

        .btn-inner {
            width: 95px;
            height: 95px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            transition: transform 0.05s, box-shadow 0.05s;
            box-shadow: inset 0 4px 8px rgba(255,255,255,0.3);
        }

        .btn-inner:active {
            transform: translateY(6px);
            box-shadow: inset 0 8px 12px rgba(0,0,0,0.6);
        }

        /* 버튼 상단 LED 구멍 */
        .led-hole {
            width: 8px;
            height: 8px;
            background: #000;
            border-radius: 50%;
            margin-bottom: 5px;
        }

        /* 개별 버튼 색상 (이미지 참조) */
        .black { background: radial-gradient(circle, #555, #111); color: white; }
        .red { background: radial-gradient(circle, #b22222, #600); color: white; }
        .green { background: radial-gradient(circle, #4caf50, #1b3d1d); color: white; }

        /* LED 점등 효과 */
        .active-green { background: #0f0 !important; box-shadow: 0 0 15px #0f0 !important; }
        .active-red { background: #f00 !important; box-shadow: 0 0 15px #f00 !important; }

        /* 텍스트 스타일 */
        .icon { font-size: 40px; }
        .stop-text { font-size: 26px; font-weight: 900; }
        .label { font-size: 16px; color: #331; font-weight: 900; letter-spacing: -0.5px; }

    </style>
</head>
<body>

<div class="remote-body">
    <!-- 장식 요소 -->
    <div class="screw s-tl"></div><div class="screw s-tr"></div>
    <div class="screw s-bl"></div><div class="screw s-br"></div>
    <div class="hazard-stripe"></div>

    <div class="button-stack">
        <!-- UP -->
        <div class="btn-group">
            <div class="btn-outer">
                <button class="btn-inner black" onmousedown="playEngine(5)" ontouchstart="playEngine(5)">
                    <div class="led-hole" id="l1"></div>
                    <span class="icon">▲</span>
                </button>
            </div>
            <div class="label">LIFT UP</div>
        </div>

        <!-- DOWN -->
        <div class="btn-group">
            <div class="btn-outer">
                <button class="btn-inner black" onmousedown="playEngine(5)" ontouchstart="playEngine(5)">
                    <div class="led-hole" id="l2"></div>
                    <span class="icon">▼</span>
                </button>
            </div>
            <div class="label">LIFT DOWN</div>
        </div>

        <!-- EMERGENCY -->
        <div class="btn-group">
            <div class="btn-outer" style="background: #400;">
                <button class="btn-inner red" onclick="toggleSiren()">
                    <div class="led-hole" id="l3"></div>
                    <span class="stop-text">STOP</span>
                </button>
            </div>
            <div class="label">EMERGENCY</div>
        </div>

        <!-- CALL -->
        <div class="btn-group">
            <div class="btn-outer" style="background: #131;">
                <button class="btn-inner green" onclick="playCall()">
                    <div class="led-hole" id="l4"></div>
                    <span class="icon">📞</span>
                </button>
            </div>
            <div class="label">CALL</div>
        </div>
    </div>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let isEmergency = false;
    let sirenInterval = null;

    // 강력한 엔진 소리 (볼륨 최대)
    function playEngine(duration) {
        if (isEmergency) return;

        // LED 켜기
        document.getElementById('l1').classList.add('active-green');
        document.getElementById('l2').classList.add('active-green');

        const now = audioCtx.currentTime;
        const master = audioCtx.createGain();
        master.gain.value = 1.5; // 볼륨 증폭

        // 3중 소리 레이어링 (웅장함)
        const oscs = [
            { f: 40, t: 'sawtooth', g: 0.6 },
            { f: 80, t: 'square', g: 0.4 },
            { f: 120, t: 'sawtooth', g: 0.3 }
        ];

        oscs.forEach(conf => {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = conf.t;
            o.frequency.setValueAtTime(conf.f, now);
            o.frequency.exponentialRampToValueAtTime(conf.f + 10, now + duration);
            g.gain.setValueAtTime(conf.g, now);
            g.gain.exponentialRampToValueAtTime(0.01, now + duration);
            o.connect(g).connect(master).connect(audioCtx.destination);
            o.start(now);
            o.stop(now + duration);
        });

        setTimeout(() => {
            document.getElementById('l1').classList.remove('active-green');
            document.getElementById('l2').classList.remove('active-green');
        }, duration * 1000);
    }

    // 비상 사이렌
    function toggleSiren() {
        const led = document.getElementById('l3');
        if (isEmergency) {
            isEmergency = false;
            led.classList.remove('active-red');
            clearInterval(sirenInterval);
        } else {
            isEmergency = true;
            led.classList.add('active-red');
            sirenInterval = setInterval(() => {
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.frequency.setValueAtTime(500, audioCtx.currentTime);
                o.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.4);
                g.gain.value = 0.5;
                o.connect(g).connect(audioCtx.destination);
                o.start(); o.stop(audioCtx.currentTime + 0.5);
            }, 600);
        }
    }

    // 전화 연결
    function playCall() {
        const led = document.getElementById('l4');
        led.classList.add('active-green');
        
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.frequency.value = 440;
        g.gain.value = 0.3;
        o.connect(g).connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + 1);

        setTimeout(() => {
            const msg = new SpeechSynthesisUtterance("전화를 연결하고 있습니다. 잠시만 기다려 주십시오.");
            msg.lang = 'ko-KR';
            window.speechSynthesis.speak(msg);
            msg.onend = () => led.classList.remove('active-green');
        }, 1200);
    }
</script>

</body>
</html>
